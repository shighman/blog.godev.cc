name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  PROJECT_PATH: "blog.godev.cc/blog.godev.cc.csproj"
  POSTS_DIR: "blog.godev.cc/wwwroot/posts"
  PUBLISH_DIR: "blog.godev.cc/bin/Release/net10.0/publish/wwwroot"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate posts.json manifest from post files
        run: |
          POSTS_DIR="${{ env.POSTS_DIR }}"
          MANIFEST="$POSTS_DIR/posts.json"
          echo "[" > "$MANIFEST"
          FIRST=true
          for f in "$POSTS_DIR"/*.json; do
            [ "$(basename "$f")" = "posts.json" ] && continue
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> "$MANIFEST"
            fi
            # Extract everything except contentHtml to keep the manifest small
            python3 -c "
          import json, sys
          with open('$f') as fh:
              post = json.load(fh)
          post.pop('contentHtml', None)
          json.dump(post, sys.stdout, indent=2)
          " >> "$MANIFEST"
          done
          echo "" >> "$MANIFEST"
          echo "]" >> "$MANIFEST"
          echo "Generated manifest with $(grep -c '"slug"' "$MANIFEST") posts"
          cat "$MANIFEST"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Blazor WASM app
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release

      - name: Copy index.html to 404.html (SPA fallback — no JS needed)
        run: cp ${{ env.PUBLISH_DIR }}/index.html ${{ env.PUBLISH_DIR }}/404.html

      - name: Add .nojekyll file
        run: touch ${{ env.PUBLISH_DIR }}/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
